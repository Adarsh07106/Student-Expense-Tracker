<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Expense Tracker Pro</title>

    <link rel="stylesheet" href="style.css">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<nav class="bottom-nav">

<button id="homeBtn">🏠<br>Home</button>

<button id="historyBtn">📜<br>History</button>

<button id="chartBtn">📊<br>Chart</button>

<button id="summaryBtn">💰<br>Summary</button>

</nav>
<body>

<div class="app">

    <header class="topbar">
        <section class="card">

<h2>Today's Expense</h2>

<h1 id="todayExpense">₹0</h1>

        </section>
        <h1>💰 Expense Tracker Pro</h1>
        <p>Monthly Budget ₹5000</p>
    </header>

    <section class="dashboard">

        <div class="card">
            <h3>Budget</h3>
            <span id="budget">₹5000</span>
        </div>

        <div class="card">
            <h3>Spent</h3>
            <span id="spent">₹0</span>
        </div>

        <div class="card">
            <h3>Remaining</h3>
            <span id="remaining">₹5000</span>
        </div>

    </section>

    <section class="progress-section">

        <div class="progress-bar">

            <div id="progress"></div>

        </div>

    </section>

    <section class="add-expense">

        <h2>Add Expense</h2>

        <input type="date" id="date">

        <select id="category">

            <option>Breakfast</option>
            <option>Lunch</option>
            <option>Dinner</option>
            <option>Water</option>
            <option>Travel</option>
            <option>Study</option>
            <option>Recharge</option>
            <option>Rent</option>
            <option>Electricity</option>
            <option>Other</option>

        </select>

        <input
            type="number"
            id="amount
            placeholder="Amount">

<input
type="text"
id="note"
placeholder="Write a note">

<button id="addBtn">
➕ Add Expense
</button>

</section>

<section class="history">
    <select id="monthFilter">

<option value="">📅 All Months</option>

<option value="01">January</option>
<option value="02">February</option>
<option value="03">March</option>
<option value="04">April</option>
<option value="05">May</option>
<option value="06">June</option>
<option value="07">July</option>
<option value="08">August</option>
<option value="09">September</option>
<option value="10">October</option>
<option value="11">November</option>
<option value="12">December</option>

    </select>

<h2>Expense History</h2>
<input
type="text"
id="searchExpense"
placeholder="🔍 Search category or note..."
>
<table>

<thead>

<tr>

<th>Date</th>
<th>Category</th>
<th>Amount</th>
<th>Note</th>

</tr>

</thead>

<tbody id="expenseList">

</tbody>

</table>

</section>

<section class="chart">
    <section class="summary">

<h2>Monthly Summary</h2>

<div class="summary-card">

<p>Total Expense</p>

<h2 id="totalExpense">₹0</h2>

</div>

<div class="summary-card">

<p>Average Per Day</p>

<h2 id="averageExpense">₹0</h2>

</div>

<div class="summary-card">

<p>Total Entries</p>

<h2 id="totalEntries">0</h2>

</div>

    </section>

<h2>Expense Analytics</h2>

<canvas id="pieChart"></canvas>

</section>
<button id="fab">+</button>
</div>

<script src="app.js"></script>

</body>
</html>
