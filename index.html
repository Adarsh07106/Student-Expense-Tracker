<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Expense Tracker Pro</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <header class="topbar">
        <h1>💰 Expense Tracker Pro</h1>
        <p>Monthly Budget ₹5000</p>
    </header>

    <section class="dashboard">

        <div class="card">
            <h3>Budget</h3>
            <span id="budget">₹5000</span>
        </div>

        <div class="card">
            <h3>Spent</h3>
            <span id="spent">₹0</span>
        </div>

        <div class="card">
            <h3>Remaining</h3>
            <span id="remaining">₹5000</span>
        </div>

    </section>

    <section class="progress-section">

        <div class="progress-bar">

            <div id="progress"></div>

        </div>

    </section>

    <section class="add-expense">

        <h2>Add Expense</h2>

        <input type="date" id="date">

        <select id="category">

            <option>Breakfast</option>
            <option>Lunch</option>
            <option>Dinner</option>
            <option>Water</option>
            <option>Travel</option>
            <option>Study</option>
            <option>Recharge</option>
            <option>Rent</option>
            <option>Electricity</option>
            <option>Other</option>

        </select>
